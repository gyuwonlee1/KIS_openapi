name: KIS Stock Alert Bot

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-alert-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore KIS token cache
        uses: actions/cache@v4
        with:
          path: .cache/kis-alerts
          key: kis-token-${{ github.run_id }}
          restore-keys: |
            kis-token-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run alert bot
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          KIS_BASE_URL: ${{ secrets.KIS_BASE_URL }}
          PORTFOLIO_PATH: portfolio.json
          STATE_PATH: state/last_alerts.json
          KIS_TOKEN_CACHE_PATH: .cache/kis-alerts/kis_token.json
          MARKET_HOURS_ENABLED: "true"
        run: python main.py

      - name: Commit alert state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/last_alerts.json
          if git diff --cached --quiet; then
            echo "No alert state changes to commit."
            exit 0
          fi
          git commit -m "Update alert state"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
